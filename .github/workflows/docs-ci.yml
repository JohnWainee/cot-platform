name: docs-ci

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/check-doc-structure.mjs"
      - ".markdownlint.json"
      - ".github/workflows/docs-ci.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: ADR / PRD structure check
        run: node scripts/check-doc-structure.mjs

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint PR title (conventional commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          npm install --no-save @commitlint/cli@19 @commitlint/config-conventional@19
          echo "$PR_TITLE" | npx commitlint
